services:
  - type: web
    name: ghq-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ghq-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false
      - key: UPI_ID
        sync: false
      - key: UPI_NAME
        value: GamerHeadQuarter
      - key: PAYMENT_CODE_EXPIRY_HOURS
        value: "24"

databases:
  - name: ghq-db
    databaseName: ghq_db
    user: ghq_user
    plan: free
